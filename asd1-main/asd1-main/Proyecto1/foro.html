    <div id="foro-page-wrapper">

        
        <div id="foro-header">
            <h1 class="titulo1">🌌 Foro Espacial</h1>
            <p id="foro-header-subtitulo">Comparte tus conocimientos, preguntas y curiosidades sobre el universo</p>
        </div>

        
        <div id="foro-nuevo-post">
            <h2>✍️ Nuevo Mensaje</h2>

            <input  class="foro-input" id="foro-input-autor"
                    type="text" placeholder="Tu nombre (ej: AstronautaX)" maxlength="30">

            <input  class="foro-input" id="foro-input-titulo"
                    type="text" placeholder="Título de tu mensaje" maxlength="80">

            <textarea class="foro-textarea" id="foro-input-contenido"
                      placeholder="Escribe tu mensaje aquí..."></textarea>

            <button id="foro-btn-publicar" onclick="foroPublicarPost()">
                🚀 Publicar
            </button>
        </div>

        
        <div id="foro-posts-lista"></div>

    </div>

    
    <div id="foro-toast"></div>
