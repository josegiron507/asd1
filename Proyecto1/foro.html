<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Foro - Sistema Solar</title>
 
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Exo:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Sekuya&display=swap" rel="stylesheet">
 
    <link rel="stylesheet" href="css/all.css">
    <link rel="stylesheet" href="css/foro.css">
</head>
 
<body style="background-color: black;" background="imagenes1/Espacio.jpg">
 
    <!-- ── Menú de navegación ── -->
    <ul>
        <li><a class="Menu" href="index.html">Inicio</a></li>
        <li><a class="Menu" href="2.html">Explora</a></li>
        <li><a class="Menu" href="3.html">Noticias</a></li>
        <li><a class="Menu" href="foro.html">Foro</a></li>
    </ul>
 
    <!-- ── Contenedor principal ── -->
    <div id="foro-page-wrapper">
 
        <!-- Encabezado -->
        <div id="foro-header">
            <h1 class="titulo1">🌌 Foro Espacial</h1>
            <p id="foro-header-subtitulo">Comparte tus conocimientos, preguntas y curiosidades sobre el universo</p>
        </div>
 
        <!-- Formulario nuevo post -->
        <div id="foro-nuevo-post">
            <h2><i class="fa-solid fa-meteor"></i> Nuevo Mensaje</h2>
 
            <input  class="foro-input" id="foro-input-autor"
                    type="text" placeholder="Tu nombre (ej: AstronautaX)" maxlength="30">
 
            <input  class="foro-input" id="foro-input-titulo"
                    type="text" placeholder="Título de tu mensaje" maxlength="80">
 
            <textarea class="foro-textarea" id="foro-input-contenido"
                      placeholder="Escribe tu mensaje aquí..."></textarea>
 
            <button id="foro-btn-publicar" onclick="foroPublicarPost()">
                <i class="fa-solid fa-bullhorn"></i> Publicar
            </button>
        </div>
 
        <!-- Lista de posts -->
        <div id="foro-posts-lista">
            <!-- Estado de carga inicial -->
            <div id="foro-loading-state" style="text-align:center; padding:60px 20px; color:#555577;">
                <div style="font-size:50px; margin-bottom:16px;">🔭</div>
                <p style="font-size:18px; font-family:'Exo',sans-serif;">Conectando con el universo...</p>
            </div>
        </div>
 
    </div>
 
    <!-- Toast de notificación -->
    <div id="foro-toast"></div>
 
    <!-- FontAwesome -->
    <script src="https://kit.fontawesome.com/1a0401c79a.js" crossorigin="anonymous"></script>
 
    <!-- ══════════════════════════════════════════
         Firebase SDK  (auto-configurado por Firebase Hosting)
         ══════════════════════════════════════════ -->
    <script src="/__/firebase/12.13.0/firebase-app-compat.js"></script>
    <script src="/__/firebase/12.13.0/firebase-firestore-compat.js"></script>
    <!-- init.js inyecta automáticamente apiKey, projectId, etc. -->
    <script src="/__/firebase/init.js"></script>
 
    <!-- Lógica del foro -->
    <script src="foro.js"></script>
 
</body>
</html>
